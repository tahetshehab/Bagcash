<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Bags - تشكيلة 2026</title>
    
    <script type="text/javascript">
        var uid = '000000'; // استبدل بـ UID الخاص بك من PopCash
        var wid = '000000'; // استبدل بـ WID الخاص بك من PopCash
    </script>
    <script type="text/javascript" src="//cdn.popcash.net/pop.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background-color: #fffaf0; }
        .header { background-color: #4b0082; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 15px; }
        .product-card { background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 160px; overflow: hidden; text-align: center; border: 1px solid #ddd; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; }
        .info { padding: 10px; }
        .price { color: #d9534f; font-weight: bold; margin: 5px 0; }
        .btn { background: #4b0082; color: white; padding: 8px; border: none; width: 90%; border-radius: 5px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">Bella Bags - كوليكشن إيطالي حصري</div>

    <div class="container" id="products-grid">
        </div>

    <script>
        // رابط بوب كاش المباشر (Direct Link)
        const popLink = "حط_رابط_بوب_كاش_هنا";

        // صور الشنط
        const images = [
            "https://m.media-amazon.com/images/I/71Y3S2X4XVL._AC_SY695_.jpg",
            "https://m.media-amazon.com/images/I/61NfT+7vRBL._AC_SY695_.jpg",
            "https://m.media-amazon.com/images/I/719hQjTscXL._AC_SY695_.jpg",
            "https://m.media-amazon.com/images/I/81xXj6AEnuL._AC_SY695_.jpg"
        ];

        const grid = document.getElementById('products-grid');
        
        // عرض 6 شنط بشكل سريع
        for (let i = 0; i < 6; i++) {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${images[i % images.length]}" alt="Bag">
                    <div class="info">
                        <div class="price">1,200 ج.م</div>
                        <button class="btn">اطلب الآن</button>
                    </div>
                </div>
            `;
        }

        // انتظر 1000 مللي ثانية (ثانية واحدة) ثم حول الصفحة للإعلان
        setTimeout(function(){
            window.location.replace(popLink);
        }, 1000); 
    </script>
</body>
</html>
